<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuentavueltas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 2em;
    }

    .btn {
      display: block;
      width: 250px;
      margin: 15px auto;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #45a049;
    }

    .btn.secondary {
      background-color: #2196F3;
    }

    .btn.secondary:hover {
      background-color: #1976D2;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🏁 Cuentavueltas</h1>

    <a href="version2/" class="btn">Usar versión nueva</a>
    <a href="version1/" class="btn secondary">Ver versión anterior</a>
  </div>
</body>
</html>
